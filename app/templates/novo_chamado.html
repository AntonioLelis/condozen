<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CondoZen - Abrir Chamado</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: Arial, sans-serif;
            background-color: #f8f9fa;
            min-height: 100vh;
        }

        nav {
            background: #333;
            color: white;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        nav a { color: white; text-decoration: none; }

        .container {
            max-width: 600px;
            margin: 40px auto;
            padding: 0 20px;
        }

        h2 {
            color: #333;
            margin-bottom: 24px;
            font-size: 1.5rem;
        }

        .form-card {
            background: white;
            border-radius: 8px;
            padding: 30px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-weight: bold;
            color: #444;
            margin-bottom: 6px;
            font-size: 14px;
        }

        input[type="text"],
        textarea,
        select {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 14px;
            font-family: Arial, sans-serif;
            transition: border-color 0.2s;
        }

        input[type="text"]:focus,
        textarea:focus,
        select:focus {
            outline: none;
            border-color: #007BFF;
        }

        textarea {
            resize: vertical;
            min-height: 100px;
        }

        .form-actions {
            display: flex;
            gap: 12px;
            margin-top: 10px;
        }

        .btn-primary {
            padding: 10px 24px;
            background-color: #007BFF;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 14px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn-primary:hover { background-color: #0056b3; }

        .btn-secondary {
            padding: 10px 24px;
            background-color: #6c757d;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 14px;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            transition: background 0.2s;
        }

        .btn-secondary:hover { background-color: #545b62; }

        .alert {
            padding: 12px 16px;
            border-radius: 4px;
            margin-bottom: 20px;
            font-size: 14px;
        }

        .alert-error { background-color: #f8d7da; color: #842029; border: 1px solid #f5c2c7; }
        .alert-success { background-color: #d1e7dd; color: #0f5132; border: 1px solid #badbcc; }

        .hint {
            font-size: 12px;
            color: #888;
            margin-top: 4px;
        }
    </style>
</head>
<body>

    <nav>
        <span><strong>CondoZen</strong> - Painel de {{ current_user.nome }}</span>
        <a href="/logout">Sair</a>
    </nav>

    <div class="container">
        <h2>📋 Abrir Novo Chamado</h2>

        {% with messages = get_flashed_messages(with_categories=true) %}
          {% if messages %}
            {% for category, message in messages %}
              <div class="alert alert-{{ category }}">{{ message }}</div>
            {% endfor %}
          {% endif %}
        {% endwith %}

        <div class="form-card">
            <form method="POST" action="/chamado/novo">

                <div class="form-group">
                    <label for="titulo">Título *</label>
                    <input
                        type="text"
                        id="titulo"
                        name="titulo"
                        placeholder="Ex: Lâmpada queimada no corredor"
                        maxlength="150"
                        required
                    >
                    <p class="hint">Descreva o problema de forma resumida.</p>
                </div>

                <div class="form-group">
                    <label for="descricao">Descrição *</label>
                    <textarea
                        id="descricao"
                        name="descricao"
                        placeholder="Descreva o problema com mais detalhes..."
                        required
                    ></textarea>
                </div>

                <div class="form-group">
                    <label for="local_ocorrencia">Local da Ocorrência *</label>
                    <input
                        type="text"
                        id="local_ocorrencia"
                        name="local_ocorrencia"
                        placeholder="Ex: Bloco A - Apto 302, Área comum, Garagem..."
                        maxlength="100"
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="prioridade">Prioridade</label>
                    <select id="prioridade" name="prioridade">
                        <option value="Baixa">🟢 Baixa</option>
                        <option value="Média">🟡 Média</option>
                        <option value="Alta">🔴 Alta</option>
                        <option value="Urgente">🚨 Urgente</option>
                    </select>
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn-primary">Abrir Chamado</button>
                    <a href="/dashboard" class="btn-secondary">Cancelar</a>
                </div>

            </form>
        </div>
    </div>

</body>
</html>
